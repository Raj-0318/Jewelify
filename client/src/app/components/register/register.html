<div
    class="min-h-screen bg-surface flex flex-col lg:flex-row font-light font-sans text-gray-900 overflow-hidden pt-20 m-8">
    <!-- Left Side: Brand/Image Area -->
    <div
        class="lg:w-1/2 bg-secondary relative hidden lg:flex flex-col items-center justify-center p-12 overflow-hidden">
        <!-- Abstract Background Decorative Elements -->
        <div class="absolute top-0 right-0 w-96 h-96 bg-primary/10 rounded-full -mr-48 -mt-48 blur-3xl"></div>
        <div class="absolute bottom-0 left-0 w-96 h-96 bg-accent/10 rounded-full -ml-48 -mb-48 blur-3xl"></div>

        <!-- Brand Logo for Desktop -->
        <div class="absolute top-12 left-12">
            <a routerLink="/" class="flex items-center gap-3 cursor-pointer group">
                <svg class="w-16 h-16 text-black hover:text-primary transition-colors duration-500 flex-shrink-0"
                    viewBox="0 0 100 40" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path
                        d="M15,20 C15,5 40,5 50,20 C60,35 85,35 85,20 C85,10 75,5 65,10 C55,15 45,25 35,30 C25,35 15,30 15,20 Z" />
                    <path d="M40,20 C45,10 55,10 60,20 C60,30 50,35 45,30 C35,25 25,15 25,10" opacity="0.3"
                        stroke-width="0.5" />
                </svg>
                <span
                    class="text-3xl font-display font-bold tracking-tight text-white group-hover:text-primary transition-colors duration-300">Jewelify</span>
            </a>
        </div>

        <div class="relative z-10 text-center max-w-md">
            <h1 class="text-5xl lg:text-6xl font-display font-bold text-white tracking-tight leading-tight mb-6">
                Join our<br /><span class="text-primary italic font-serif">Legacy.</span>
            </h1>
            <p class="text-gray-300 text-lg font-light leading-relaxed">
                Create an account to experience exclusive collections and personalized shopping.
            </p>
        </div>
    </div>

    <!-- Right Side: Register Form Area -->
    <div class="flex-1 flex flex-col justify-center py-12 px-6 lg:px-24 bg-gray-50 lg:bg-white relative">
        <div class="max-w-md w-full mx-auto">
            <!-- Mobile Logo -->
            <div class="lg:hidden flex justify-center mb-12">
                <a routerLink="/" class="flex items-center gap-3 cursor-pointer group">
                    <svg class="w-8 h-8 text-primary group-hover:scale-110 transition-transform duration-300 drop-shadow-md"
                        fill="currentColor" viewBox="0 0 24 24">
                        <path fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"
                            d="M12 22 C12 22 10 16 12 10 C14 4 12 2 12 2" />
                        <path d="M12 2 C10 4 10 8 12 10 C14 8 14 4 12 2 Z" />
                        <path d="M11.5 10.5 C8 9 5 11 6 14 C8 15 11 14 11.5 10.5 Z" />
                        <path d="M12.5 9.5 C16 8 19 10 18 13 C16 14 13 13 12.5 9.5 Z" />
                        <path d="M11.8 15.5 C8.5 14.5 5.5 16.5 6.5 19.5 C8.5 20.5 11.5 19 11.8 15.5 Z" />
                        <path d="M12.2 14.5 C15.5 13.5 18.5 15.5 17.5 18.5 C15.5 19.5 12.5 18 12.2 14.5 Z" />
                    </svg>
                    <span
                        class="text-3xl font-display font-bold bg-gradient-to-r from-gray-900 to-gray-700 bg-clip-text text-transparent group-hover:from-primary transition-all duration-300 tracking-tight">Jewelify</span>
                </a>
            </div>

            <div class="text-center lg:text-left mb-10">
                <h2 class="text-3xl lg:text-4xl font-display font-bold text-gray-900 tracking-tight">
                    Create account
                </h2>
                <p class="mt-2 text-gray-500">
                    Sign up for free and start shopping today.
                </p>
            </div>

            <!-- Error Alert -->
            <div *ngIf="errorMessage"
                class="bg-red-50 text-red-600 px-4 py-3 rounded-xl border border-red-100 flex items-center text-sm animate-shake mb-6">
                <svg class="w-5 h-5 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                {{ errorMessage }}
            </div>

            <form #registerForm="ngForm" (ngSubmit)="onSubmit()" class="space-y-5">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <div class="relative">
                        <input [(ngModel)]="name" name="name" type="text" id="name" required minlength="2"
                            #nameCtrl="ngModel"
                            class="block w-full px-4 py-3 rounded-xl border border-gray-200 text-gray-900 placeholder-gray-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all duration-200 bg-gray-50 focus:bg-white outline-none"
                            [class.border-red-300]="nameCtrl.invalid && (nameCtrl.dirty || nameCtrl.touched)"
                            placeholder="John Doe">
                        <div
                            class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
                            <svg *ngIf="!nameCtrl.invalid || (!nameCtrl.dirty && !nameCtrl.touched)" class="w-5 h-5"
                                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                            <svg *ngIf="nameCtrl.invalid && (nameCtrl.dirty || nameCtrl.touched)"
                                class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                    <div class="relative">
                        <input [(ngModel)]="email" name="email" type="email" id="email" required email
                            #emailCtrl="ngModel"
                            class="block w-full px-4 py-3 rounded-xl border border-gray-200 text-gray-900 placeholder-gray-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all duration-200 bg-gray-50 focus:bg-white outline-none"
                            [class.border-red-300]="emailCtrl.invalid && (emailCtrl.dirty || emailCtrl.touched)"
                            placeholder="you@example.com">
                        <div
                            class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
                            <svg *ngIf="!emailCtrl.invalid || (!emailCtrl.dirty && !emailCtrl.touched)" class="w-5 h-5"
                                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                            </svg>
                            <svg *ngIf="emailCtrl.invalid && (emailCtrl.dirty || emailCtrl.touched)"
                                class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <input [(ngModel)]="password" name="password" [type]="showPassword ? 'text' : 'password'"
                            id="password" required minlength="6" #passwordCtrl="ngModel"
                            class="block w-full px-4 py-3 rounded-xl border border-gray-200 text-gray-900 placeholder-gray-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all duration-200 bg-gray-50 focus:bg-white outline-none"
                            [class.border-red-300]="passwordCtrl.invalid && (passwordCtrl.dirty || passwordCtrl.touched)"
                            placeholder="••••••••">
                        <div class="absolute inset-y-0 right-0 flex items-center pr-3">
                            <button type="button" (click)="togglePasswordVisibility()"
                                class="text-gray-400 hover:text-gray-600 focus:outline-none transition-colors duration-200">
                                <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                                <svg *ngIf="showPassword" class="w-5 h-5" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                                </svg>
                            </button>
                            <svg *ngIf="passwordCtrl.invalid && (passwordCtrl.dirty || passwordCtrl.touched)"
                                class="w-5 h-5 text-red-500 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirm
                        Password</label>
                    <div class="relative">
                        <input [(ngModel)]="confirmPassword" name="confirmPassword"
                            [type]="showConfirmPassword ? 'text' : 'password'" id="confirmPassword" required
                            #confirmPasswordCtrl="ngModel"
                            class="block w-full px-4 py-3 rounded-xl border border-gray-200 text-gray-900 placeholder-gray-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all duration-200 bg-gray-50 focus:bg-white outline-none"
                            [class.border-red-300]="(confirmPasswordCtrl.dirty) && (password !== confirmPassword)"
                            placeholder="••••••••">
                        <div class="absolute inset-y-0 right-0 flex items-center pr-3">
                            <button type="button" (click)="toggleConfirmPasswordVisibility()"
                                class="text-gray-400 hover:text-gray-600 focus:outline-none transition-colors duration-200">
                                <svg *ngIf="!showConfirmPassword" class="w-5 h-5" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                                <svg *ngIf="showConfirmPassword" class="w-5 h-5" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <button type="submit" [disabled]="registerForm.invalid || password !== confirmPassword"
                    class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-lg shadow-primary/30 text-sm font-bold text-white bg-gray-900 hover:bg-gray-800 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none">
                    Create Account
                </button>

                <!-- Divider -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-gray-50 lg:bg-white text-gray-500">Or sign up with</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button type="button"
                        class="flex items-center justify-center px-4 py-2.5 border border-gray-300 hover:border-gray-600 duration-200 rounded-xl shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-200">
                        <svg class="h-5 w-5 mr-2" viewBox="0 0 24 24">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                        Google
                    </button>
                    <button type="button"
                        class="flex items-center justify-center px-4 py-2.5 border border-gray-300 hover:border-gray-600 duration-200 rounded-xl shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-200">
                        <svg class="h-5 w-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M12 2C6.477 2 2 6.477 2 12c0 4.418 3.582 8 8 8v-8h-2.5v-3h2.5v-2.143c0-2.436 1.455-3.791 3.684-3.791 1.067 0 2.179.191 2.179.191v2.395h-1.228c-1.207 0-1.583.749-1.583 1.517v1.831h2.712l-.433 3h-2.279v8C19.333 19.333 22 15.69 22 12c0-5.523-4.477-10-10-10z" />
                        </svg>
                        Facebook
                    </button>
                </div>
            </form>

            <p class="text-center text-sm text-gray-500 mt-8">
                Already have an account?
                <a routerLink="/login" class="font-bold text-primary hover:text-primary-dark transition-colors">
                    Sign in
                </a>
            </p>
        </div>
    </div>
</div>
